name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Publish the three crates to crates.io in dependency order. `cargo publish`
  # (>=1.66) waits for each crate to appear in the index before returning, so
  # the dependent crates resolve the just-published version. Requires the
  # CARGO_REGISTRY_TOKEN repository secret.
  crates-io:
    name: crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish
        run: |
          cargo publish --locked -p octofhir-sof
          cargo publish --locked -p octofhir-sof-lint
          cargo publish --locked -p octofhir-sof-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  binaries:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross linker (aarch64 linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
      - name: Build
        run: cargo build --release --locked -p octofhir-sof-cli --features parquet --target ${{ matrix.target }}
      - name: Package (unix)
        if: matrix.os != 'windows-latest'
        run: |
          bin=target/${{ matrix.target }}/release/octofhir-sof
          tar -czf octofhir-sof-${{ matrix.target }}.tar.gz -C "$(dirname "$bin")" octofhir-sof
      - name: Package (windows)
        if: matrix.os == 'windows-latest'
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/octofhir-sof.exe -DestinationPath octofhir-sof-${{ matrix.target }}.zip
      # Emit a `<archive>.sha256` next to each archive so the installer can
      # verify the download. The file holds the bare hash (awk '{print $1}' in
      # install.sh reads the first field either way).
      - name: Checksum (macOS)
        if: matrix.os == 'macos-latest'
        run: shasum -a 256 octofhir-sof-${{ matrix.target }}.tar.gz > octofhir-sof-${{ matrix.target }}.tar.gz.sha256
      - name: Checksum (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: sha256sum octofhir-sof-${{ matrix.target }}.tar.gz > octofhir-sof-${{ matrix.target }}.tar.gz.sha256
      - name: Checksum (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          $h = (Get-FileHash -Algorithm SHA256 "octofhir-sof-${{ matrix.target }}.zip").Hash.ToLower()
          "$h  octofhir-sof-${{ matrix.target }}.zip" | Out-File -Encoding ascii -NoNewline "octofhir-sof-${{ matrix.target }}.zip.sha256"
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            octofhir-sof-${{ matrix.target }}.tar.gz
            octofhir-sof-${{ matrix.target }}.tar.gz.sha256
            octofhir-sof-${{ matrix.target }}.zip
            octofhir-sof-${{ matrix.target }}.zip.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
