name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  binaries:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross linker (aarch64 linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
      - name: Build
        run: cargo build --release --locked -p octofhir-sof-cli --target ${{ matrix.target }}
      - name: Package (unix)
        if: matrix.os != 'windows-latest'
        run: |
          bin=target/${{ matrix.target }}/release/octofhir-sof
          tar -czf octofhir-sof-${{ matrix.target }}.tar.gz -C "$(dirname "$bin")" octofhir-sof
      - name: Package (windows)
        if: matrix.os == 'windows-latest'
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/octofhir-sof.exe -DestinationPath octofhir-sof-${{ matrix.target }}.zip
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            octofhir-sof-${{ matrix.target }}.tar.gz
            octofhir-sof-${{ matrix.target }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
